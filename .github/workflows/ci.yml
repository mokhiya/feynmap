name: CI — migrate · seed · deploy-tests

# Поднимает Postgres+pgvector, применяет миграции и seed, гоняет unit + db-deploy
# тесты, затем поднимает сервер и прогоняет post-deploy smoke (deploy-check).
# Ничего из боевого кода не меняется — только проверки.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  deploy-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: feynmap
          POSTGRES_PASSWORD: feynmap
          POSTGRES_DB: feynmap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U feynmap -d feynmap"
          --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      DATABASE_URL: postgres://feynmap:feynmap@localhost:5432/feynmap
      JWT_SECRET: ci-test-secret-please-rotate-0000000000000000
      NODE_ENV: test
      # Стаб-провайдеры: ни облачного ключа, ни сети для smoke не нужно.
      LLM_PROVIDER: local
      EMBEDDING_PROVIDER: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Enable pgvector + pgcrypto
        run: |
          PGPASSWORD=feynmap psql -h localhost -U feynmap -d feynmap \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pgcrypto;"

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Migrate
        working-directory: backend
        run: npm run db:migrate

      - name: Seed (16 прав · 6 ролей · матрица · dev-admin)
        working-directory: backend
        run: npm run db:seed
        env:
          SEED_DEV_ADMIN: 'true'
          SEED_DEV_EMAIL: admin@feynmap.local
          SEED_DEV_PASSWORD: ci-admin-pass-123

      - name: Unit + DB-deploy tests
        working-directory: backend
        run: node --test test/

      - name: Boot server
        working-directory: backend
        run: |
          node server.js > /tmp/feynmap.log 2>&1 &
          echo $! > /tmp/feynmap.pid

      - name: Post-deploy smoke (deploy-check)
        working-directory: backend
        run: node scripts/deploy-check.mjs
        env:
          SMOKE_BASE_URL: http://localhost:8787
          SMOKE_EMAIL: admin@feynmap.local
          SMOKE_PASSWORD: ci-admin-pass-123
          SMOKE_TIMEOUT_MS: '30000'

      - name: Server log on failure
        if: failure()
        run: cat /tmp/feynmap.log || true

      - name: Stop server
        if: always()
        run: kill "$(cat /tmp/feynmap.pid)" 2>/dev/null || true
